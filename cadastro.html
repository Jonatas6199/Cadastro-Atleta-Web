<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01</title>
    <script>
        function cadastrar(event){
            const nome = document.getElementById("input-nome").value; //.value é pra pegar o valor dentro do id do objeto
            event.preventDefault(); //Previne o recarregamento da página

            document.getElementById("mensagem").textContent = "Dados do " + nome + " cadastrados!";
            document.getElementById("overlay").style.display = "flex";
            document.getElementById("form-cadastro").reset(); // limpa todos os campos
        }
        function showHelpMessage(){
            document.getElementById("mensagem").textContent = "Preencha todos os campos do formulário";
            document.getElementById("overlay").style.display = "flex";
        }
        function fechar(){
             document.getElementById("overlay").style.display = "none";
        }

        document.addEventListener("DOMContentLoaded", function(){
            document.getElementById("overlay").onclick = function(e){
            if(e.target.id === "overlay"){
                fechar();
            }
         }
        });

        document.addEventListener("keydown", function(e){
            if(e.key === "Escape"){
                fechar();
            }
        });

         
    </script>
    <link rel="stylesheet" href="style.css">
    
</head>
<div id="overlay" class="overlay">
    <div class="modal">
        <p id="mensagem"></p>
        <button onclick="fechar()">Fechar</button>
    </div>
</div>
<body>
    <main>
        <form id="form-cadastro" onsubmit="cadastrar(event)">
        <h1> <!--Títulos-->
        Formulário de Cadastro
        </h1>
        <div class="inputs">
            <div class="grupoLabelInput">
                <label for="input-nome">Nome:</label>
                <input id="input-nome" placeholder="Digite seu nome" type="text" required>
            </div>
            <div class="grupoLabelInput">
                <label for="input-email">Email:</label>
                <input id="input-email" placeholder="Digite seu email" type="email" required>
            </div>
            <div class="grupoLabelInput">
                <label for="input-senha">Senha:</label>
                <input id="input-senha" placeholder="Digite sua senha" type="password" required>
            </div>
        </div>
        <button id="btn-cadastrar" type="submit">
            Cadastrar
        </button>
        </form>
        
    </main>
    <button class="help" onclick="showHelpMessage()">
        <img src="help.svg">
    </button>
    <footer>
            Copywright 2026 © Todos os direitos reservados
    </footer>
    
</body>
</html>
